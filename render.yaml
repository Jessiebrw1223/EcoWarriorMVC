services:
  - type: web
    name: ecowarrior-mvc
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: DATABASE_URL
        fromDatabase:
          name: ecowarrior-db
          property: connectionString

databases:
  - name: ecowarrior-db
    plan: free
